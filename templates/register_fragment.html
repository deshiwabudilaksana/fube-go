{{define "main"}}
<div id="auth-container" class="min-h-screen flex items-center justify-center animate-fade-in px-4 py-12">
    <div class="max-w-md w-full">
        <!-- Logo/Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-600 rounded-3xl shadow-xl shadow-emerald-200 mb-6 transform rotate-6">
                <span class="text-3xl font-black text-white">F</span>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Get Started</h1>
            <p class="mt-3 text-gray-500 font-medium">
                Already have an account? <a href="/login" class="text-primary-600 hover:text-primary-700 font-bold underline decoration-2 underline-offset-4" hx-get="/login" hx-target="body" hx-push-url="true">Sign in here</a>
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white p-10 rounded-3xl shadow-2xl shadow-gray-200 border border-gray-100">
            <form class="space-y-5" hx-post="/register" hx-target="#error-message" hx-swap="innerHTML">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 sm:col-span-1">
                        <label for="username" class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                        <input id="username" name="username" type="text" required 
                               class="block w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-primary-100 focus:border-primary-500 transition-all font-medium" 
                               placeholder="chef_joe">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="company-name" class="block text-sm font-bold text-gray-700 mb-2">Company</label>
                        <input id="company-name" name="company_name" type="text" required 
                               class="block w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-primary-100 focus:border-primary-500 transition-all font-medium" 
                               placeholder="Bistro 42">
                    </div>
                </div>
                
                <div>
                    <label for="email-address" class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required 
                           class="block w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-primary-100 focus:border-primary-500 transition-all font-medium" 
                           placeholder="chef@bistro42.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <input id="password" name="password" type="password" required 
                           class="block w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-primary-100 focus:border-primary-500 transition-all font-medium" 
                           placeholder="••••••••">
                </div>

                <div id="error-message" class="text-rose-600 text-sm font-bold text-center empty:hidden"></div>

                <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black uppercase tracking-widest rounded-2xl text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-4 focus:ring-primary-200 transition-all shadow-lg shadow-primary-200 mt-4">
                    Create Account
                </button>
            </form>
        </div>

        <p class="text-center mt-10 text-xs text-gray-400 font-bold uppercase tracking-[0.2em]">
            &copy; 2024 Fube Operations Inc.
        </p>
    </div>
</div>
{{end}}
