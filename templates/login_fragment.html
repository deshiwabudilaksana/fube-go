{{define "main"}}
<div id="auth-container" class="min-h-screen flex items-center justify-center animate-fade-in px-4">
    <div class="max-w-md w-full">
        <!-- Logo/Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-primary-600 rounded-3xl shadow-xl shadow-primary-200 mb-6 transform -rotate-6">
                <span class="text-3xl font-black text-white">F</span>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Welcome Back</h1>
            <p class="mt-3 text-gray-500 font-medium">
                New to Fube Go? <a href="/register" class="text-primary-600 hover:text-primary-700 font-bold underline decoration-2 underline-offset-4" hx-get="/register" hx-target="body" hx-push-url="true">Create an account</a>
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white p-10 rounded-3xl shadow-2xl shadow-gray-200 border border-gray-100">
            <form class="space-y-6" hx-post="/login" hx-target="#error-message" hx-swap="innerHTML">
                <div class="space-y-5">
                    <div>
                        <label for="email-address" class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required 
                               class="block w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-primary-100 focus:border-primary-500 transition-all font-medium" 
                               placeholder="name@company.com">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label for="password" class="block text-sm font-bold text-gray-700">Password</label>
                            <a href="#" class="text-xs font-bold text-primary-600 hover:text-primary-700">Forgot?</a>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                               class="block w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-primary-100 focus:border-primary-500 transition-all font-medium" 
                               placeholder="••••••••">
                    </div>
                </div>

                <div id="error-message" class="text-rose-600 text-sm font-bold text-center empty:hidden"></div>

                <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black uppercase tracking-widest rounded-2xl text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-4 focus:ring-primary-200 transition-all shadow-lg shadow-primary-200">
                    Sign In
                </button>
            </form>
        </div>
        
        <p class="text-center mt-10 text-xs text-gray-400 font-bold uppercase tracking-[0.2em]">
            &copy; 2024 Fube Operations Inc.
        </p>
    </div>
</div>
{{end}}
